<body class="login-bg">

<!-- NAVBAR PRO -->
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="container-fluid position-relative">

    <a class="navbar-brand logo-left" href="../index.html">
      <img src="../asset/logo.png" width="45" class="rounded-circle">
    </a>

    <span class="brand-center">The Haze Club</span>

    <div class="d-flex align-items-center ms-auto gap-3">
      <i class="bi bi-search icon-nav"></i>
      <i class="bi bi-person icon-nav"></i>

      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menuNav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>

    <div class="collapse navbar-collapse mt-3" id="menuNav">
      <ul class="navbar-nav ms-auto text-end">

    </div>

  </div>

<!-- LOGIN -->
<main class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

  <div class="login-card">

    <h2 class="text-center mb-4">Iniciar sesión</h2>

    <form>
      <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control input-custom" placeholder="tu@email.com" required>
      </div>

      <div class="mb-3">
        <label>Contraseña</label>
        <input type="password" class="form-control input-custom" placeholder="********" required>
      </div>
      <div class="form-check mb-3">
  <input class="form-check-input" type="checkbox" id="terminos" required>
  <label class="form-check-label">
    Acepto los 
    <a href="./terminos.html" target="_blank">Términos y Condiciones</a>
  </label>
</div>

      <button class="btn btn-success w-100 btn-login">Entrar</button>

      <div class="text-center mt-3">
        <a href="#" class="link-login">¿Olvidaste tu contraseña?</a>
      </div>

      <div class="text-center mt-2">
        <span>No tenés cuenta?</span>
        <a href="#" class="link-login">Registrate</a>
      </div>

    </form>

  </div>

</main>

<footer class="bg-dark text-white text-center py-4">
  <p>© 2026 The Haze Club</p>
</footer>
